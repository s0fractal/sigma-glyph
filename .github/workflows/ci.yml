name: conformance
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Reference test vectors (Book I, hash-thunk machine)
        run: python3 impl/sigma_glyph.py | tee /dev/stderr | grep -q "ALL PASS"
      - name: Wave reference (Book II, LUT arbiter + interfere coupling)
        run: python3 impl/sigma_wave.py | tee /dev/stderr | grep -q "WAVE. ALL PASS"
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Federation reference (Book III, selection-only oracle)
        run: python3 impl/sigma_federation.py | tee /dev/stderr | grep -q "FEDERATION. ALL PASS"
      - name: Federation second implementation (Go) + differential
        shell: bash
        run: |
          set -euo pipefail
          cd impl-go && go build -o sigma-federation-go . && cd ..
          ./impl-go/sigma-federation-go replay tests/spec_conformance/federation_vectors.json \
            | tee /dev/stderr | grep -q "FEDERATION-GO: ALL PASS"
          python3 tests/federation_differential.py \
            | tee /dev/stderr | grep -q "FEDERATION-DIFFERENTIAL: ALL AGREE"
      - name: Governance second implementation (Go) + differential
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet cryptography
          ./impl-go/sigma-federation-go gov-replay tests/spec_conformance/governance_vectors.json \
            | tee /dev/stderr | grep -q "GOVERNANCE-GO: ALL PASS"
          python3 tests/governance_differential.py \
            | tee /dev/stderr | grep -q "GOVERNANCE-DIFFERENTIAL: ALL AGREE"
      - name: Conformance vectors are fresh (regenerate == no diff)
        run: |
          python3 tests/spec_conformance/generate.py
          python3 impl/sigma_wave.py gen
          python3 impl/sigma_federation.py gen
          python3 -m pip install --quiet cryptography
          python3 tools/anchor_governance.py gen
          git diff --exit-code tests/spec_conformance/vectors.json tests/spec_conformance/wave_vectors.json tests/spec_conformance/federation_vectors.json tests/spec_conformance/governance_vectors.json
      - name: Conformance suite (vectors.json vs oracle)
        run: python3 tests/spec_conformance/run_reference.py
      - name: Property-based suite (seeded, stdlib-only)
        run: python3 tests/spec_conformance/test_properties.py
      - name: Verify Specification Anchors
        run: python3 tools/verify_anchors.py
      - name: Verify adjudication warrants (.warrants/, settlement-grade, incl. ski@v1 re-runs)
        run: |
          python3 -m pip install --quiet cryptography
          curl -sfL https://raw.githubusercontent.com/s0fractal/warrant/c038ce36b61445a5d82371975afd21d541e07752/impl/warrant.py -o /tmp/warrant.py
          SIGMA_GLYPH=impl python3 /tmp/warrant.py verify
          SIGMA_GLYPH=impl python3 /tmp/warrant.py verify --settlement --trust-config trust-config.json
      - name: Anchor governance (GOV-anchors.md, ENFORCED — trust anchor fetched out-of-band from the warrant repo)
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/anchor_governance.py selftest | tee /dev/stderr | grep -q "ANCHOR-GOVERNANCE: ALL PASS"
          python3 tools/anchor_governance.py replay | tee /dev/stderr | grep -q "GOVERNANCE-REPLAY: ALL PASS"
          curl -sfL https://raw.githubusercontent.com/s0fractal/warrant/a4270f863f6bcee837f7ef0363536b7e6cdf5ee6/trust/sigma-glyph-anchor-trust.json -o /tmp/anchor-trust.json
          python3 tools/anchor_governance.py status --enforce --trust-config /tmp/anchor-trust.json | tee /dev/stderr | grep -q "AUTHORIZED"
      - name: Two-jurisdictions federation demo (Book III live, real stores)
        shell: bash
        run: |
          set -euo pipefail
          python3 examples/two-jurisdictions/demo.py | tee /dev/stderr | grep -q "DEMO: ALL ASSERTIONS HELD"
