name: conformance
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Reference test vectors (Book I, TV-1..TV-10 + negatives)
        run: python3 impl/sigma_glyph.py | tee /dev/stderr | grep -q "ALL PASS"
      - name: Conformance vectors are fresh (regenerate == no diff)
        run: python3 tests/spec_conformance/generate.py && git diff --exit-code tests/spec_conformance/vectors.json
      - name: Conformance suite (vectors.json vs oracle)
        run: python3 tests/spec_conformance/run_reference.py
      - name: Property-based suite (seeded, stdlib-only)
        run: python3 tests/spec_conformance/test_properties.py
      - name: Verify Specification Anchors
        run: python3 tools/verify_anchors.py
      - name: Verify adjudication warrants (.warrants/)
        run: |
          python3 -m pip install --quiet cryptography
          curl -sfL https://raw.githubusercontent.com/s0fractal/warrant/c433a8a8ba99b3696477796c7453401ecf596991/impl/warrant.py -o /tmp/warrant.py
          python3 /tmp/warrant.py verify
