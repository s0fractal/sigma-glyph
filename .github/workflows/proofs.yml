name: proofs
on: [push, pull_request]
jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (pinned toolchain)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat proofs/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Check the memory-bound proof
        run: lean proofs/SizeBound.lean && echo "PROOF CHECKS"
      - name: Bridge - step premise holds on live oracle traces
        run: python3 proofs/bridge_check.py
