name: proofs
on: [push, pull_request]
jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (pinned toolchain)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat proofs/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Check the memory-bound proof
        run: lean proofs/SizeBound.lean && echo "PROOF CHECKS"
      - name: Bridge - step premise holds on live oracle traces
        run: python3 proofs/bridge_check.py
      - name: Wave-algebra proofs + differential bridge (Book II)
        shell: bash
        run: |
          set -euo pipefail
          python3 proofs/wave_bridge_check.py | tee /dev/stderr | grep -q "WAVE-BRIDGE: ALL AGREE"
      - name: Byte-level machine correspondence + differential bridge (Book I bytes)
        shell: bash
        run: |
          set -euo pipefail
          python3 proofs/byte_bridge_check.py | tee /dev/stderr | grep -q "BYTE-BRIDGE: ALL AGREE"
      - name: Evaluator determinism/totality + differential bridge (Book I eval)
        shell: bash
        run: |
          set -euo pipefail
          python3 proofs/eval_bridge_check.py | tee /dev/stderr | grep -q "EVAL-BRIDGE: ALL AGREE"
